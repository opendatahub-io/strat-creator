# Pipeline-level settings for JQL-based RFE discovery
jql:
  project: RHAIRFE
  required_labels:
    - strat-creator-3.5
    - strat-creator-3.6
  target_versions:     # OR'd with required_labels via cf[10855]
    - rhoai-3.5
    - rhoai-3.5.EA2
    - rhoai-3.5.EA1
    - rhoai-3.6
    - rhoai-3.6.EA1
    - rhoai-3.6.EA2
    - "3.5 GA RHOAI RELEASE"
    - "3.6 EA1 RHAII RELEASE"
    - "3.6 EA1 RHOAI RELEASE"
    - "3.6 EA2 RHOAI RELEASE"
    - "3.6 GA RHAII RELEASE"
    - "3.6 GA RHOAI RELEASE"
  quality_labels:      # at least one required
    - rfe-creator-autofix-rubric-pass
    - tech-reviewed
  excluded_statuses:
    - Closed
    - Resolved
    - Draft
  order_by: key ASC

batch_size: 10

# Labels on RHAISTRAT that indicate the RFE was already processed
skip_labels:
  - strat-creator-rubric-pass
  - strat-creator-needs-attention
  - strat-creator-processing

# RHAISTRAT statuses that indicate active or completed work — exclude
# their source RFEs from batching to avoid wasting batch slots
excluded_strat_statuses:
  - In Progress
  - Review
  - Release Pending
  - Closed
  - Resolved
